<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guide — not a record (for marion)</title>
<link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'VCR OSD Mono';
    src: url('assets/fonts/vcr-osd-mono.regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8f8;
    --fg: #1a1a1a;
    --muted: #888;
    --faint: #ccc;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Encode Sans', sans-serif;
    font-size: 0.78rem;
    line-height: 1.75;
  }

  body {
    padding: 2.4rem 2.2rem 3rem;
  }

  h1 {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin-bottom: 1.6rem;
    color: var(--fg);
  }

  .essay {
    max-width: 480px;
    color: var(--fg);
  }

  .essay p {
    margin-bottom: 1.1rem;
    color: var(--muted);
  }

  .essay p:last-child {
    margin-bottom: 0;
  }

  .essay a {
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .essay a:hover {
    color: var(--muted);
  }

  .essay em {
    font-style: italic;
  }
</style>
</head>
<body>

  <h1>guide</h1>

  <div class="essay">
    <!-- Replace or add <p> tags below with your essay text -->
    <p><em>Essay coming soon.</em></p>
  </div>

</body>
</html>
