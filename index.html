<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>not a record (for marion)</title>
<link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'VCR OSD Mono';
    src: url('assets/fonts/vcr-osd-mono.regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8f8;
    --text: #1a1a1a;
    --muted: #888;
    --faint: #ccc;
    --bar-fill: #1a1a1a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Encode Sans', sans-serif;
    overflow: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    flex-shrink: 0;
    width: 100%;
    padding: 0 40px;
    position: relative;
  }

  .controls-btn-group {
    display: flex;
    gap: 48px;
    align-items: center;
  }

  .controls button {
    background: none;
    border: none;
    font-family: 'Encode Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }

  #btnRewind { cursor: w-resize; }
  #btnFwd    { cursor: e-resize; }
  #btnRecord { cursor: pointer; }

  .controls button:hover,
  .controls button.active {
    color: var(--text);
  }

  /* SCROLL STRIP */
  .strip-outer {
    width: 100%;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .strip-track {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0;
    will-change: transform;
    user-select: none;
  }

  /* THUMBNAIL ITEM */
  .thumb-item {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    cursor: default;
  }

  .thumb-img-wrap {
    width: 110px;
    height: 146px;
    overflow: hidden;
  }

  .thumb-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.5s ease, opacity 0.5s ease;
  }

  .thumb-item.dismissed .thumb-img-wrap img {
    filter: grayscale(100%) brightness(0.75);
    opacity: 0.5;
  }

  .thumb-item.dismissed {
    pointer-events: auto;
    cursor: not-allowed !important;
  }

  .thumb-item.dismissed * {
    pointer-events: none;
  }

  .thumb-item.dismissed .thumb-number {
    text-decoration: line-through;
  }

  .thumb-number {
    margin-top: 6px;
    font-size: 0.48rem;
    font-weight: 300;
    color: var(--faint);
    letter-spacing: 0.04em;
    font-family: 'Encode Sans', sans-serif;
    transition: color 0.15s;
  }

  .thumb-item:hover .thumb-number {
    color: var(--muted);
  }

  /* EDGE FADES */
  .strip-outer::before,
  .strip-outer::after {
    content: '';
    position: absolute;
    top: 0;
    width: 100px;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }
  .strip-outer::before {
    left: 0;
    background: linear-gradient(to right, var(--bg), transparent);
  }
  .strip-outer::after {
    right: 0;
    background: linear-gradient(to left, var(--bg), transparent);
  }

  /* PLAY/PROGRESS BAR */
  .progress-wrap {
    flex-shrink: 0;
    width: 100%;
    padding: 0 40px;
    margin-top: 28px;
    cursor: crosshair;
  }

  .progress-bar-bg {
    width: 100%;
    height: 2px;
    background: var(--faint);
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--bar-fill);
    width: 0%;
    pointer-events: none;
  }

  .progress-time {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    font-family: 'VCR OSD Mono', 'DM Mono', 'Courier New', monospace;
    font-size: 0.58rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* INFO PANEL: play mode and "cia/record" mode */
  .info-panel {
    flex-shrink: 0;
    height: 72px;
    margin-top: 20px;
    width: 100%;
    padding: 0 40px;
    position: relative;
  }

  .info-panel.mode-record {
    overflow: visible;
  }

  .info-cia {
    display: none;
    flex-direction: column;
    gap: 3px;
    position: absolute;
    left: 40px;
    right: 40px;
    top: 0;
    background: var(--bg);
    z-index: 10;
    overflow-y: auto;
    max-height: calc(100vh - 400px);
    padding-bottom: 8px;
  }

  /* NORMAL MODE: single-entry info */
  .info-normal {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-row {
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-row span.label {
    font-weight: 300;
    color: var(--muted);
    margin-right: 8px;
  }

  .info-row a {
    color: #0047AB;
    text-decoration: underline;
  }

  .info-row a:visited { color: #0047AB; }

  /* RECORD MODE: CIA doc list */
  .cia-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .cia-thumb {
    width: 36px;
    height: 48px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cia-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }

  /* Mode Toggling */
  .mode-normal .info-normal { display: flex; }
  .mode-normal .info-cia { display: none; }
  .mode-record .info-normal { display: none; }
  .mode-record .info-cia { display: flex; }

  .info-panel.empty .info-normal { opacity: 0; }
  .info-panel.empty .info-cia { opacity: 0; }

  #centerDate {
    font-family: 'VCR OSD Mono', 'DM Mono', 'Courier New', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--muted);
    line-height: 1;
    white-space: nowrap;
    pointer-events: none;
    position: absolute;
    right: 40px;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .controls {
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      margin-bottom: 16px;
    }

    .controls-btn-group {
      gap: 32px;
    }

    /* Hide full button text, show short label via data-short attribute */
    .controls button {
      font-size: 0;
    }

    .controls button::after {
      font-size: 0.72rem;
      content: attr(data-short);
    }

    #centerDate {
      font-size: 0.65rem;
      position: static;
      right: auto;
    }

    .progress-wrap {
      padding: 0 20px;
      margin-top: 20px;
    }

    .info-panel {
      padding: 0 20px;
      height: auto;
      min-height: 60px;
    }

    .info-cia {
      left: 20px;
      right: 20px;
    }

    .info-row {
      font-size: 0.62rem;
    }
  
    /* eject-mode: TRACKING left-aligned on mobile */
    #ejectTimeSpacer {
      visibility: hidden;
    }
    #ejectTracking {
      position: static;
      transform: none;
      left: auto;
      flex: 1;
      text-align: left;
    }
    #ejectTimeRow {
      justify-content: space-between;
    }
}

  /* ESSAY OVERLAY */
  .thumb-essay {
    display: flex;
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 7px 8px;
    background: transparent;
    font-family: 'Encode Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
    letter-spacing: 0.01em;
    z-index: 5;
    cursor: pointer;
    align-items: center;
    text-align: left;
    scrollbar-width: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  .thumb-essay::-webkit-scrollbar { display: none; }
  .thumb-img-wrap { position: relative; }
  .thumb-essay.visible { opacity: 1; pointer-events: none; }

  /* CORNER BUTTONS */
  .corner-btn {
    position: fixed;
    top: 1.1rem;
    font-family: 'Encode Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    color: var(--fg);
    background: none;
    border: none;
    cursor: help;
    padding: 0;
    z-index: 100;
    opacity: 0.55;
    transition: opacity 0.15s;
  }
  .corner-btn:hover { opacity: 1; }
  #btnGuide { left: 1.4rem; }
  #btnInfo  { right: 1.4rem; }

  /* EJECT BUTTON — fixed bottom center, always visible */
  #btnEject {
    cursor: pointer;
    position: fixed;
    bottom: 1.4rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    font-family: 'Encode Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    color: var(--muted);
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  #btnEject:hover { color: var(--text); }

  /* In eject-mode, the button text turns white and cursor changes */
  body.eject-mode #btnEject {
    color: #FFFFFF;
    cursor: grab;
  }
  body.eject-mode #btnEject:hover {
    color: #FFFFFF;
    opacity: 0.75;
    cursor: grab;
  }
  body.eject-mode #btnEject:active {
    cursor: grabbing;
    opacity: 1;
  }

  /* FADE OVERLAY — blue field with grain */
  #ejectOverlay {
    position: fixed;
    inset: 0;
    background: #0066FF;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #ejectOverlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* Grain canvas — fixed to viewport */
  #ejectGrain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.09;
  }

  /* Tracking lines canvas */
  #ejectLines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 211;
    opacity: 0;
    transition: opacity 0.4s ease 0.3s;
  }
  body.eject-mode #ejectLines {
    opacity: 1;
  }

  /* OSD shared style — off-white */
  .eject-osd {
    font-family: 'VCR OSD Mono', 'DM Mono', 'Courier New', monospace;
    color: #E8E8F0;
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden; /* for clip-path scanline reveal */
  }

  /* NO INPUT (eject-mode) text — JS sets top; scanline reveal via clip-path */
  .no-input-text {
    text-shadow: 2px 2px 0px #00083A, -1px -1px 0px #00083A;
    font-size: 2.4rem;
    font-weight: 1000;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 212;
    clip-path: inset(0 0 100% 0); /* fully hidden top-to-bottom — JS reveals downward */
    transition: none;
  }
  body.eject-mode .no-input-text {
    /* JS drives the clip-path animation */
  }

  /* EJECT PROGRESS BAR */
  #ejectProgressWrap {
    position: fixed;
    left: 0;
    right: 0;
    padding: 0 40px;
    z-index: 212;
    clip-path: inset(0 0 100% 0);
    transition: none;
  }

  #ejectProgressTrack {
    width: 100%;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    white-space: pre;
    overflow: hidden;
    line-height: 1;
  }

  /* Time row beneath the bar */
  #ejectTimeRow {
    margin-top: 7px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
  }

  #ejectTracking {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

</style>
</head>
<body>
<div class="page">

  <!-- CORNER BUTTONS -->
  <button class="corner-btn" id="btnInfo">info</button>
  <button class="corner-btn" id="btnGuide">guide</button>


  <div class="controls">
    <div class="controls-btn-group">
      <button id="btnRewind" data-full="rewind" data-short="rew">rewind</button>
      <button id="btnRecord" data-full="record" data-short="rec">record</button>
      <button id="btnFwd" data-full="fast-forward" data-short="fwd">fast-forward</button>
    </div>
    <span id="centerDate"></span>
  </div>

  <!-- EJECT BUTTON (fixed bottom center) -->
  <button id="btnEject">eject</button>

  <!-- EJECT MODE OVERLAYS -->
  <div id="ejectOverlay"><canvas id="ejectGrain"></canvas></div>
  <canvas id="ejectLines"></canvas>
  <div class="no-input-text eject-osd">NO INPUT</div>
  <div id="ejectProgressWrap" class="eject-osd">
    <div id="ejectProgressTrack"></div>
    <div id="ejectTimeRow">
      <span id="ejectTimeSpacer" style="visibility:hidden">0:00:00</span>
      <span id="ejectTracking">TRACKING...</span>
      <span>0:00:00</span>
    </div>
  </div>

  <div class="strip-outer" id="stripOuter">
    <div class="strip-track" id="stripTrack"></div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg" id="progressBg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-time">
      <span id="timeCurrent">0:00:00</span>
      <span id="timeTotal"></span>
    </div>
  </div>

  <div class="info-panel mode-normal empty" id="infoPanel">
    <div class="info-normal">
      <div class="info-row" id="infoDate"><span class="label">date</span></div>
      <div class="info-row" id="infoViews"><span class="label">views</span></div>
      <div class="info-row" id="infoUrl"></div>
    </div>
    <div class="info-cia" id="infoCia"></div>
  </div>

</div>

<script>

let DATA = [];
let CIA = [];
let ESSAY_TEXT = "";

Promise.all([
  fetch('assets/marion_journal.json').then(res => res.json()),
  fetch('assets/cia_journal_links.json').then(res => res.json()),
  fetch('assets/essay.txt').then(res => res.text())
]).then(([data, cia, essay]) => {
  DATA = data;
  CIA = cia;
  ESSAY_TEXT = essay;
  init();
});

const track = document.getElementById('stripTrack');
const centerDateEl = document.getElementById('centerDate');
const stripOuter = document.getElementById('stripOuter');

const panel = document.getElementById('infoPanel');
const infoDate = document.getElementById('infoDate');
const infoViews = document.getElementById('infoViews');
const infoUrl = document.getElementById('infoUrl');
const infoCia = document.getElementById('infoCia');
const btnRewind = document.getElementById('btnRewind');
const btnRecord = document.getElementById('btnRecord');
const btnFwd = document.getElementById('btnFwd');
const progressBg = document.getElementById('progressBg');
const progressFill = document.getElementById('progressFill');
const timeCurrent = document.getElementById('timeCurrent');
const timeTotal = document.getElementById('timeTotal');
const progressWrap = document.getElementById('progressWrap');

const THUMB_W = 110;
const GAP = 12;
const STRIDE = THUMB_W + GAP;
const BASE_SPEED = 0.18;
const SCRUB_SPEED = 6;

let recordMode = false;
let pos, speed, paused;

function formatTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// DATE FORMATS: "MONTH DAY, YEAR" or "MONTH YEAR"
const MONTHS = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];

function stripMonthYearComma(s) {
  // "February, 1960" -> "February 1960"
  return s.replace(/^([A-Za-z]+),\s*(\d{4})$/, '$1 $2');
}

function formatEntryDate(entry) {
  const label = entry.title.replace(/^Marion Stokes Journal\s*\(?(.*?)\)?$/, '$1').trim();
  if (label) return stripMonthYearComma(label);
  // Fallback: parse from entry.date field (YYYY-MM-DD or YYYY-MM)
  if (!entry.date) return '';
  const full = entry.date.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (full) {
    const d = new Date(parseInt(full[1]), parseInt(full[2]) - 1, parseInt(full[3]));
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  const partial = entry.date.match(/(\d{4})-(\d{2})/);
  if (partial) {
    return `${MONTHS[parseInt(partial[2]) - 1]} ${partial[1]}`;
  }
  return entry.date;
}

// Build CIA list HTML for a journal entry
function buildCiaList(entry) {
  const docs = CIA[entry.identifier] || [];
  const dateHeader = `<div class="info-row" style="margin-bottom:8px;"><span class="label">date</span>${formatEntryDate(entry)}</div>`;
  if (!docs.length) return dateHeader + '<div class="cia-row" style="color:var(--muted);font-size:0.62rem;">no linked CIA documents</div>';
  
  const sample = docs
    .slice()
    .sort(() => Math.random() - 0.5)
    .slice(0, 5);
  
  return dateHeader + sample.map(d => `
    <div class="cia-row">
      <img class="cia-thumb" src="${d.thumb_url}" alt="" loading="lazy">
      <div class="cia-info">
        <div class="info-row"><span class="label">title</span>${d.name}</div>
        <div class="info-row"><span class="label">views</span>${d.views}</div>
        <div class="info-row"><span class="label">url</span><a href="${d.url}" target="_blank" rel="noopener">${d.url}</a></div>
      </div>
    </div>
  `).join('');
}

// DATE FORMAT: Change "date:[1960-02-06 AND ...]" to MM-YYYY
function parseMmYear(date) {
  if (!date) return '';
  const match = date.match(/(\d{4})-(\d{2})/);
  if (!match) return date;
  return `${match[2]}-${match[1]}`;
}

function updateCenterDate() {
  const rect = stripOuter.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const items = track.querySelectorAll('.thumb-item:not(.dismissed)');
  let closest = null, closestDist = Infinity;
  items.forEach(item => {
    const r = item.getBoundingClientRect();
    const itemCenter = r.left + r.width / 2;
    const dist = Math.abs(itemCenter - centerX);
    if (dist < closestDist) {
      closestDist = dist;
      closest = item;
    }
  });
  if (closest) {
    const idx = parseInt(closest.dataset.dataIdx);
    const entry = DATA[idx];
    if (entry) {
      centerDateEl.textContent = parseMmYear(entry.date) || entry.title;
    }
  }
}

// Generate downloadable CSV text for a journal entry's CIA docs
function buildCsv(entry) {
  const docs = CIA[entry.identifier] || [];
  const header = 'name,views,url,thumb,date\n';
  const rows = docs.map(d =>
    `"${d.name.replace(/"/g,'""')}",${d.views},"${d.url}","${d.thumb_url}","${d.date}"`
  ).join('\n');
  return header + rows;
}

// Download a text file
function downloadCsv(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadRandomPDF(entry){
  const docs = CIA[entry.identifier] || [];
  const randomDoc = docs.length > 0 ? docs[Math.floor(Math.random() * docs.length)] : null;
  const a = document.createElement('a');
  a.href = randomDoc.pdf_url;
  a.download = randomDoc.identifier + '.pdf';
  a.click();
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const img = e.target;
      img.src = img.dataset.src;
      observer.unobserve(img);
    }
  });
}, { rootMargin: '200px' });

function init(){
  const singleSetWidth = DATA.length * STRIDE;
  const totalSeconds = Math.round(singleSetWidth / (BASE_SPEED * 60));
  timeTotal.textContent = formatTime(totalSeconds);
  // Build strip items — 3 copies for seamless loop
  // Tracks whether mouse is over a thumbnail or the info panel
  let hoverThumb = false;
  let hoverPanel = false;
  let resumeTimer = null;
  const RESUME_DELAY = 2000; // ms after leaving both before scroll resumes

  function cancelResume() {
    if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
  }

  function scheduleResume() {
    cancelResume();
    resumeTimer = setTimeout(() => {
      if (!hoverThumb && !hoverPanel) {
        paused = false;
        panel.classList.add('empty');
        infoDate.innerHTML = `<span class="label">date</span>`;
        infoViews.innerHTML = `<span class="label">views</span>`;
        infoUrl.innerHTML = '';
        infoCia.innerHTML = '';
      }
    }, RESUME_DELAY);
  }

  // Pause scroll when mouse enters the info panel
  panel.addEventListener('mouseenter', () => {
    hoverPanel = true;
    cancelResume();
  });
  panel.addEventListener('mouseleave', () => {
    hoverPanel = false;
    if (!hoverThumb) scheduleResume();
  });

  function showInfo(entry, item) {
    if (item.classList.contains('dismissed')) return;
    cancelResume();
    paused = true;
    panel.classList.remove('empty');
    updateCenterDate();
    if (recordMode) {
      infoCia.innerHTML = buildCiaList(entry);
      item.style.cursor = 'pointer';
    } else {
      let dateLabel = stripMonthYearComma(entry.title.replace(/^Marion Stokes Journal\s*\(?(.*?)\)?$/, '$1').trim());
      const DATE_OVERRIDES = {
        'December 19, 1982) and Post-Its from (November 28, and 29, and December 1, 4, 5, 6, 18, 19, 22, and 24, 1982':
          'December 19, 1982, and Post-Its from Nov. 28 and 29, and Dec. 1, 4, 5, 6, 18, 19, 22, and 24, 1982'
      };
      if (DATE_OVERRIDES[dateLabel]) dateLabel = DATE_OVERRIDES[dateLabel];
      infoDate.innerHTML = `<span class="label">date</span>${dateLabel}`;
      infoViews.innerHTML = `<span class="label">views</span>${entry.views}`;
      infoUrl.innerHTML = `<span class="label">url</span><a href="${entry.url}" target="_blank" rel="noopener">${entry.url}</a>`;
      item.style.cursor = 'pointer';
    }
  }

  function startHideInfo(item) {
    hoverThumb = false;
    item.style.cursor = 'default';
    if (!hoverPanel) scheduleResume();
  }

  function hideInfo(item) {
    paused = false;
    panel.classList.add('empty');
    infoDate.innerHTML = `<span class="label">date</span>`;
    infoViews.innerHTML = `<span class="label">views</span>`;
    infoUrl.innerHTML = '';
    infoCia.innerHTML = '';
    item.style.cursor = 'default';
  }

  function doAction(entry, item) {
    if (recordMode) {
      downloadRandomPDF(entry);
    } else {
      // Show essay and dismiss in one click — apply to all 3 copies
      const di = parseInt(item.dataset.dataIdx);
      document.querySelectorAll(`.thumb-item[data-data-idx="${di}"]`).forEach(el => {
        el.classList.add('dismissed');
        const essay = el.querySelector('.thumb-essay');
        if (essay) { essay.classList.add('visible'); essay.scrollTop = 0; }
      });
      cancelResume();
      paused = false;
      panel.classList.add('empty');
    }
  }

  for (let rep = 0; rep < 3; rep++) {
    DATA.forEach((entry, localIdx) => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.dataset.dataIdx = localIdx;

      const wrap = document.createElement('div');
      wrap.className = 'thumb-img-wrap';

      const img = document.createElement('img');
      img.dataset.src = entry.thumb_url;
      img.alt = entry.title;
      observer.observe(img);
      img.onerror = () => { item.style.display = 'none'; };

      const num = document.createElement('div');
      num.className = 'thumb-number';
      num.textContent = localIdx + 1;

      const essayWords = ESSAY_TEXT.split(/\s+/).filter(Boolean);
      const essay = document.createElement('div');
      essay.className = 'thumb-essay';
      essay.textContent = essayWords[localIdx] || '';

      essay.addEventListener('click', (e) => {
        e.stopPropagation();
      });

      wrap.appendChild(img);
      wrap.appendChild(essay);
      item.appendChild(wrap);
      item.appendChild(num);
      track.appendChild(item);

      // Mouse events
      item.addEventListener('mouseenter', () => { hoverThumb = true; showInfo(entry, item); });
      item.addEventListener('mouseleave', () => startHideInfo(item));
      item.addEventListener('click', () => doAction(entry, item));

      // Touch events
      let touchStartX = 0, touchStartY = 0, touchStartPos = 0;
      let isTouchScroll = false;
      let infoVisible = false;

      item.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartPos = pos;
        isTouchScroll = false;
      }, { passive: true });

      item.addEventListener('touchmove', (e) => {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (!isTouchScroll && Math.abs(dx) > 5) isTouchScroll = true;
        if (!isTouchScroll && Math.abs(dy) > 5) isTouchScroll = true;
        if (isTouchScroll) {
          const delta = Math.abs(dx) >= Math.abs(dy) ? -dx : dy;
          pos = touchStartPos - delta;
          if (pos >= singleSetWidth * 2) pos -= singleSetWidth;
          if (pos < singleSetWidth) pos += singleSetWidth;
          track.style.transform = `translateX(${-pos}px)`;
          updateCenterDate();
        }
      }, { passive: true });

      item.addEventListener('touchend', (e) => {
        if (isTouchScroll) return;
        if (!infoVisible) {
          document.querySelectorAll('.thumb-item.touch-active').forEach(el => {
            el.classList.remove('touch-active');
          });
          item.classList.add('touch-active');
          showInfo(entry, item);
          infoVisible = true;
        } else {
          item.classList.remove('touch-active');
          hideInfo(item);
          infoVisible = false;
          doAction(entry, item);
        }
      });
    });
  }

  // Start at second set
  pos = singleSetWidth;
  speed = BASE_SPEED;
  paused = false;

  let scrubbing = false;

  function animate() {
    if (!paused || scrubbing) {
      pos += speed;
      if (pos >= singleSetWidth * .25) pos -= singleSetWidth;
      if (pos < singleSetWidth) pos += singleSetWidth;
      track.style.transform = `translateX(${-pos}px)`;
      updateProgress();
      updateCenterDate();
    }
    requestAnimationFrame(animate);
  }

  animate();

  // Strip-level touch scrolling (handles drags starting on gaps between thumbs)
  let stripTouchStartX = 0, stripTouchStartY = 0, stripTouchStartPos = 0, stripIsDragging = false;

  stripOuter.addEventListener('touchstart', (e) => {
    if (e.target.closest('.thumb-item')) return;
    stripTouchStartX = e.touches[0].clientX;
    stripTouchStartY = e.touches[0].clientY;
    stripTouchStartPos = pos;
    stripIsDragging = false;
  }, { passive: true });

  stripOuter.addEventListener('touchmove', (e) => {
    if (e.target.closest('.thumb-item')) return;
    const dx = e.touches[0].clientX - stripTouchStartX;
    const dy = e.touches[0].clientY - stripTouchStartY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) stripIsDragging = true;
    if (stripIsDragging) {
      const delta = Math.abs(dx) >= Math.abs(dy) ? -dx : dy;
      pos = stripTouchStartPos - delta;
      if (pos >= singleSetWidth * 2) pos -= singleSetWidth;
      if (pos < singleSetWidth) pos += singleSetWidth;
      track.style.transform = `translateX(${-pos}px)`;
      updateCenterDate();
    }
  }, { passive: true });

  // Progress bar touch seeking
  progressBg.addEventListener('touchstart', (e) => {
    const rect = progressBg.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
    pos = singleSetWidth + pct * singleSetWidth;
    track.style.transform = `translateX(${-pos}px)`;
    updateProgress();
  }, { passive: true });

  function updateProgress() {
    const normalized = (pos % singleSetWidth) / singleSetWidth;
    progressFill.style.width = (normalized * 100) + '%';
    timeCurrent.textContent = formatTime(Math.round(normalized * totalSeconds));
  }

  // Controls
  btnRewind.addEventListener('mousedown', (e) => { e.preventDefault(); speed = -SCRUB_SPEED; scrubbing = true; btnRewind.classList.add('active'); });
  btnFwd.addEventListener('mousedown', (e) => { e.preventDefault(); speed = SCRUB_SPEED; scrubbing = true; btnFwd.classList.add('active'); });
  btnRewind.addEventListener('touchstart', (e) => { e.preventDefault(); speed = -SCRUB_SPEED; scrubbing = true; btnRewind.classList.add('active'); });
  btnFwd.addEventListener('touchstart', (e) => { e.preventDefault(); speed = SCRUB_SPEED; scrubbing = true; btnFwd.classList.add('active'); });

  function stopScrub() {
    scrubbing = false;
    speed = BASE_SPEED;
    btnRewind.classList.remove('active');
    btnFwd.classList.remove('active');
  }
  window.addEventListener('mouseup', stopScrub);
  window.addEventListener('mouseleave', stopScrub);
  window.addEventListener('touchend', stopScrub);

  let hiddenEssays = [];

  btnRecord.addEventListener('click', () => {
    recordMode = !recordMode;
    panel.classList.toggle('mode-record', recordMode);
    panel.classList.toggle('mode-normal', !recordMode);
    btnRecord.style.color = recordMode ? '#D22B2B' : '';
    speed = BASE_SPEED;
    // Always close the infobox and resume scrolling on mode switch
    cancelResume();
    paused = false;
    hoverThumb = false;
    hoverPanel = false;
    panel.classList.add('empty');
    infoDate.innerHTML = `<span class="label">date</span>`;
    infoViews.innerHTML = `<span class="label">views</span>`;
    infoUrl.innerHTML = '';
    infoCia.innerHTML = '';
    if (recordMode) {
      hiddenEssays = Array.from(document.querySelectorAll('.thumb-essay.visible'));
      hiddenEssays.forEach(el => el.classList.remove('visible'));
    } else {
      hiddenEssays.forEach(el => el.classList.add('visible'));
      hiddenEssays = [];
    }
  });

  // Progress bar seek
  progressBg.addEventListener('click', (e) => {
    const rect = progressBg.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    pos = singleSetWidth + pct * singleSetWidth;
    track.style.transform = `translateX(${-pos}px)`;
    updateProgress();
  });

  // Mouse wheel scrubbing
  const WHEEL_SENSITIVITY = 3;
  stripOuter.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = Math.abs(e.deltaX) >= Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    pos += delta * WHEEL_SENSITIVITY;
    if (pos >= singleSetWidth * 2) pos -= singleSetWidth;
    if (pos < singleSetWidth) pos += singleSetWidth;
    track.style.transform = `translateX(${-pos}px)`;
    updateProgress();
    updateCenterDate();
  }, { passive: false });
}

  // Popup windows
  document.getElementById('btnInfo').addEventListener('click', () => {
    window.open('marion_stokes_info.html', 'info', 'width=620,height=680,resizable=yes,scrollbars=yes');
  });
  document.getElementById('btnGuide').addEventListener('click', () => {
    window.open('marion_stokes_guide.html', 'guide', 'width=620,height=680,resizable=yes,scrollbars=yes');
  });

  // ── EJECT / INSERT ────────────────────────────────────────────────────────
  const btnEject       = document.getElementById('btnEject');
  const ejectOverlay   = document.getElementById('ejectOverlay');
  const noInputText    = document.querySelector('.no-input-text');
  const ejectProgressWrap = document.getElementById('ejectProgressWrap');
  const grainCanvas    = document.getElementById('ejectGrain');
  const linesCanvas    = document.getElementById('ejectLines');
  const linesCtx       = linesCanvas.getContext('2d');
  const grainCtx       = grainCanvas.getContext('2d');
  let ejectMode        = false;
  let ejectAnimFrame   = null;

  // ── Grain ──────────────────────────────────────────────────────────────
  function resizeGrain() {
    grainCanvas.width  = window.innerWidth;
    grainCanvas.height = window.innerHeight;
  }
  function drawGrain() {
    const w = grainCanvas.width, h = grainCanvas.height;
    const img = grainCtx.createImageData(w, h);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      img.data[i] = img.data[i+1] = img.data[i+2] = v;
      img.data[i+3] = 255;
    }
    grainCtx.putImageData(img, 0, 0);
  }
  let grainTimer = null;
  function startGrain() {
    resizeGrain();
    function tick() { drawGrain(); grainTimer = setTimeout(tick, 80); }
    tick();
  }
  function stopGrain() { clearTimeout(grainTimer); grainTimer = null; }

  // ── Tracking lines ─────────────────────────────────────────────────────
  // Fixed-position lines that flicker on/off; no drifting
  const trackingLines = [];
  function resizeLines() {
    linesCanvas.width  = window.innerWidth;
    linesCanvas.height = window.innerHeight;
  }
  function spawnLine() {
    trackingLines.push({
      y:          Math.random() * window.innerHeight,
      alpha:      Math.random() * 0.55 + 0.25,
      thickness:  Math.random() < 0.4 ? 2 : 1,
      hasDouble:  Math.random() < 0.35,
      visible:    true,
      onDuration:  Math.random() * 600 + 200,
      offDuration: Math.random() * 4000 + 3000,
      timer: null,
    });
  }
  function scheduleLineFlicker(l) {
    if (!ejectMode) return;
    if (l.visible) {
      // currently on — schedule turn-off
      l.timer = setTimeout(() => {
        l.visible = false;
        scheduleLineFlicker(l);
      }, l.onDuration);
    } else {
      // currently off — schedule turn-on (new random position)
      l.timer = setTimeout(() => {
        l.y = Math.random() * window.innerHeight;
        l.alpha = Math.random() * 0.55 + 0.25;
        l.visible = true;
        scheduleLineFlicker(l);
      }, l.offDuration);
    }
  }
  function initLines() {
    // Spawn a small fixed pool of lines (2-3)
    trackingLines.length = 0;
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      // stagger initial visibility
      const l = {
        y:          Math.random() * window.innerHeight,
        alpha:      Math.random() * 0.55 + 0.25,
        thickness:  Math.random() < 0.4 ? 2 : 1,      // mostly 1px, occasionally 2px
        hasDouble:  Math.random() < 0.35,               // ~1/3 get a faint shadow stripe
        visible:    false,
        onDuration:  Math.random() * 600 + 200,
        offDuration: Math.random() * 4000 + 3000,
        timer: null,
      };
      // Stagger first appearance
      l.timer = setTimeout(() => {
        l.visible = true;
        scheduleLineFlicker(l);
      }, Math.random() * 6000 + 1000);
      trackingLines.push(l);
    }
  }
  function stopLines() {
    trackingLines.forEach(l => { if (l.timer) clearTimeout(l.timer); });
    trackingLines.length = 0;
  }
  function drawTrackingLine(l) {
    const w = linesCanvas.width;
    // Horizontal gradient: transparent → white (peaking off-center) → transparent
    // Peak is slightly left of center to feel organic
    const peakX = w * (0.35 + Math.random() * 0.25);
    const grad = linesCtx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0,                          `rgba(255,255,255,0)`);
    grad.addColorStop(Math.max(0, peakX/w - 0.18), `rgba(255,255,255,0)`);
    grad.addColorStop(peakX / w,                   `rgba(255,255,255,${l.alpha})`);
    grad.addColorStop(Math.min(1, peakX/w + 0.30), `rgba(255,255,255,${l.alpha * 0.15})`);
    grad.addColorStop(1,                           `rgba(255,255,255,0)`);

    linesCtx.beginPath();
    linesCtx.strokeStyle = grad;
    linesCtx.lineWidth = l.thickness;
    linesCtx.moveTo(0, l.y);
    linesCtx.lineTo(w, l.y);
    linesCtx.stroke();

    // Some lines have a faint secondary stripe just below (+1–2px), thinner
    if (l.hasDouble) {
      const grad2 = linesCtx.createLinearGradient(0, 0, w, 0);
      grad2.addColorStop(0,                          `rgba(255,255,255,0)`);
      grad2.addColorStop(Math.max(0, peakX/w - 0.12), `rgba(255,255,255,0)`);
      grad2.addColorStop(peakX / w,                   `rgba(255,255,255,${l.alpha * 0.35})`);
      grad2.addColorStop(Math.min(1, peakX/w + 0.22), `rgba(255,255,255,0)`);
      grad2.addColorStop(1,                           `rgba(255,255,255,0)`);
      linesCtx.beginPath();
      linesCtx.strokeStyle = grad2;
      linesCtx.lineWidth = 0.75;
      linesCtx.moveTo(0, l.y + l.thickness + 1);
      linesCtx.lineTo(w, l.y + l.thickness + 1);
      linesCtx.stroke();
    }
  }

  function animateLines() {
    if (!ejectMode) return;
    linesCtx.clearRect(0, 0, linesCanvas.width, linesCanvas.height);
    trackingLines.forEach(l => {
      if (!l.visible) return;
      drawTrackingLine(l);
    });
    requestAnimationFrame(animateLines);
  }

  // ── Scanline reveal (clip-path top-to-bottom) ──────────────────────────
  function scanlineReveal(el, delay, duration) {
    const start = performance.now() + delay;
    function frame(now) {
      const elapsed = Math.max(0, now - start);
      const pct = Math.min(1, elapsed / duration);
      // inset(top right bottom left) — shrink bottom inset from 100% → 0%
      // so content is revealed progressively from top downward
      const bottom = Math.round((1 - pct) * 100);
      el.style.clipPath = `inset(0 0 ${bottom}% 0)`;
      if (pct < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ── Position eject elements to match real layout ───────────────────────
  function positionEjectElements() {
    const controlsEl = document.querySelector('.controls');
    if (controlsEl) {
      const cr = controlsEl.getBoundingClientRect();
      noInputText.style.top = (cr.top + cr.height / 2) + 'px';
    }
    const progressEl = document.getElementById('progressWrap');
    if (progressEl) {
      const pr = progressEl.getBoundingClientRect();
      ejectProgressWrap.style.top = pr.top + 'px';
    }
  }

  // ── Playhead step animation ────────────────────────────────────────────
  let ejectStep = 0;
  let ejectStepTotal = 60;
  const EJECT_STEP_INTERVAL = 2200;

  function buildEjectBar(step, total) {
    const chars = [];
    for (let i = 0; i < total; i++) chars.push(i === step ? '*' : '-');
    return chars.join(' ');
  }
  function renderEjectBar() {
    document.getElementById('ejectProgressTrack').textContent =
      buildEjectBar(ejectStep, ejectStepTotal);
  }
  function stepEjectPlayhead() {
    if (!ejectMode) return;
    ejectStep = (ejectStep + 1) % ejectStepTotal;
    renderEjectBar();
    ejectAnimFrame = setTimeout(stepEjectPlayhead, EJECT_STEP_INTERVAL);
  }
  function startEjectAnimation() {
    const trackEl = document.getElementById('ejectProgressTrack');
    const testSpan = document.createElement('span');
    testSpan.style.cssText = 'position:absolute;visibility:hidden;font-family:"VCR OSD Mono","DM Mono","Courier New",monospace;font-size:0.58rem;letter-spacing:0.12em;white-space:pre;';
    testSpan.textContent = '- ';
    document.body.appendChild(testSpan);
    const charW = testSpan.offsetWidth;
    document.body.removeChild(testSpan);
    ejectStepTotal = Math.max(10, Math.floor(trackEl.offsetWidth / charW));
    ejectStep = 0;
    renderEjectBar();
    if (ejectAnimFrame) clearTimeout(ejectAnimFrame);
    ejectAnimFrame = setTimeout(stepEjectPlayhead, EJECT_STEP_INTERVAL);
  }

  window.addEventListener('resize', () => {
    if (!ejectMode) return;
    positionEjectElements();
    resizeLines();
    resizeGrain();
    const trackEl = document.getElementById('ejectProgressTrack');
    const testSpan = document.createElement('span');
    testSpan.style.cssText = 'position:absolute;visibility:hidden;font-family:"VCR OSD Mono","DM Mono","Courier New",monospace;font-size:0.58rem;letter-spacing:0.12em;white-space:pre;';
    testSpan.textContent = '- ';
    document.body.appendChild(testSpan);
    const charW = testSpan.offsetWidth;
    document.body.removeChild(testSpan);
    const newTotal = Math.max(10, Math.floor(trackEl.offsetWidth / charW));
    ejectStep = Math.round((ejectStep / ejectStepTotal) * newTotal) % newTotal;
    ejectStepTotal = newTotal;
    renderEjectBar();
  });

  // ── Main eject/insert handler ──────────────────────────────────────────
  btnEject.addEventListener('click', () => {
    if (ejectMode) {
      // INSERT: reset content then fade blue overlay out
      document.querySelectorAll('.thumb-item.dismissed').forEach(el => {
        el.classList.remove('dismissed');
        const essay = el.querySelector('.thumb-essay');
        if (essay) essay.classList.remove('visible');
        el.style.cursor = '';
      });
      const panel = document.getElementById('infoPanel');
      panel.classList.add('empty');
      panel.classList.remove('mode-record');
      panel.classList.add('mode-normal');
      document.getElementById('infoDate').innerHTML  = '<span class="label">date</span>';
      document.getElementById('infoViews').innerHTML = '<span class="label">views</span>';
      document.getElementById('infoUrl').innerHTML   = '';
      document.getElementById('infoCia').innerHTML   = '';
      document.getElementById('btnRecord').style.color = '';
      recordMode = false;
      paused = false;
      speed = BASE_SPEED;

      if (ejectAnimFrame) { clearTimeout(ejectAnimFrame); ejectAnimFrame = null; }
      stopGrain();
      stopLines();

      document.body.classList.remove('eject-mode');
      ejectMode = false;
      btnEject.textContent = 'eject';
      // Reset clip-paths for next entry
      noInputText.style.clipPath      = 'inset(0 0 100% 0)';
      ejectProgressWrap.style.clipPath = 'inset(0 0 100% 0)';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        ejectOverlay.classList.remove('visible');
      }));

    } else {
      // EJECT: fade overlay in, then show eject content with VHS effects
      ejectMode = true;
      paused = true;
      resizeLines();
      resizeGrain();
      ejectOverlay.classList.add('visible');
      startGrain();

      setTimeout(() => {
        positionEjectElements();
        document.body.classList.add('eject-mode');
        btnEject.textContent = 'insert';

        // Scanline reveal — NO INPUT first, then progress bar ~150ms later
        scanlineReveal(noInputText,      0,   520);
        scanlineReveal(ejectProgressWrap, 160, 400);

        // Start tracking lines and playhead
        initLines();
        animateLines();
        startEjectAnimation();
      }, 500);
    }
  });


</script></body>
